<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiquiSight</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo-container">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="url(#gradient)" stroke-width="2"/>
            <path d="M12 25L17 18L22 22L28 14" stroke="url(#gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="28" cy="14" r="3" fill="#00D4FF"/>
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00D4FF"/>
                <stop offset="100%" style="stop-color:#0066FF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="logo-text">
          <span class="brand-name">LiquiSight</span>
          <span class="brand-tagline">AI Financial Copilot</span>
        </div>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </div>

    <!-- Main Toggle -->
    <div class="main-control">
      <button class="activate-btn" id="activateBtn">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </span>
        <span class="btn-text">Activate LiquiSight</span>
        <span class="btn-shortcut">Alt + L</span>
      </button>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="action-btn" id="scanPageBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V5a2 2 0 012-2h2"/>
          <path d="M17 3h2a2 2 0 012 2v2"/>
          <path d="M21 17v2a2 2 0 01-2 2h-2"/>
          <path d="M7 21H5a2 2 0 01-2-2v-2"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Scan Page</span>
      </button>
      <button class="action-btn" id="selectAreaBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
          <path d="M15 3v18"/>
          <path d="M3 9h18"/>
          <path d="M3 15h18"/>
        </svg>
        <span>Select Area</span>
      </button>
      <button class="action-btn" id="historyBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
        <span>History</span>
      </button>
    </div>

    <!-- Stats Preview -->
    <div class="stats-preview">
      <div class="stat-item">
        <span class="stat-value" id="todayScans">0</span>
        <span class="stat-label">Scans Today</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="portfolioCount">0</span>
        <span class="stat-label">In Portfolio</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="alertsCount">0</span>
        <span class="stat-label">Alerts</span>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" class="footer-link" id="openDashboard">Open Dashboard</a>
      <a href="#" class="footer-link" id="settingsBtn">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
